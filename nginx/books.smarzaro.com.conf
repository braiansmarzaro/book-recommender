server {
    listen 80;
    server_name books.smarzaro.com;

    # Let's Encrypt ACME challenge (served from shared volume)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name books.smarzaro.com;

    ssl_certificate     /etc/letsencrypt/live/books.smarzaro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/books.smarzaro.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase buffer sizes for Streamlit's SSE/WebSocket traffic
    proxy_buffering        off;
    proxy_buffer_size      128k;
    proxy_buffers          4 256k;

    location / {
        proxy_pass         http://streamlit:8501;
        proxy_http_version 1.1;

        # WebSocket upgrade (required by Streamlit)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # Keep connection alive for long-running Streamlit sessions
        proxy_read_timeout 86400;
    }
}
